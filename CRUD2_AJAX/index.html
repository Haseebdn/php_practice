<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <title>Product Crud</title>
</head>

<body>
    <div class="container-fluid">
        <div class="container d-flex justify-content-between align-items-center">
            <h2 class=" my-4 fw-bold">Product CRUD</h2>
            <button class="ms-auto btn btn-primary " data-bs-toggle="modal" data-bs-target="#productModal"
                onclick="fetchcategory()">Add</button>
        </div>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Category</th>
                        <th>Subcategory</th>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Description</th>
                        <th>Purchase Price</th>
                        <th>Sale Price</th>
                        <th>Tax</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="product_body">

                </tbody>
            </table>

        </div>
    </div>








    <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 fw-bold" id="productModalLabel">Add Product</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="product_form">

                        <div class="mb-2">
                            <label class="fw-bold" for="category" class="col-form-label">Category:</label>
                            <select name="category" id="productCats" class="form-select">
                            </select>
                        </div>

                        <div class="mb-2">
                            <label class="fw-bold" for="subcategory" class="col-form-label">Subcategory:</label>
                            <select name="subcategory" id="productSubcats" class="form-select">
                            </select>
                        </div>

                        <div class="mb-2">
                            <label class="fw-bold" for="product_name">Product:</label>
                            <input class="form-control" type="text" name="p_name" id="product_name">
                        </div>

                        <div class="mb-2">
                            <label class="fw-bold" for="img">Image:</label>
                            <input class="form-control" type="file" name="p_thumbnail" id="img">
                        </div>

                        <div id="preview_box" class="mb-2">
                            
                        </div>

                        <div class="mb-2">
                            <label class="fw-bold" for="qty">Quantity:</label>
                            <input class="form-control" type="number" name="qty" id="qty">
                        </div>


                        <div class="mb-2">
                            <label class="fw-bold" for="message-text" class="col-form-label">Description:</label>
                            <textarea class="form-control" name="p_description" id="p_description"></textarea>
                        </div>

                        <div class="mb-2">
                            <label class="fw-bold" for="p_price">Purchase Price:</label>
                            <input class="form-control" type="number" name="p_price" id="p_price">
                        </div>

                        <div class="mb-2">
                            <label class="fw-bold" for="s_price">Sale Price:</label>
                            <input class="form-control" type="number" name="s_price" id="s_price">
                        </div>

                        <div class="mb-2">
                            <label class="fw-bold" for="tax">Tax:</label>
                            <input class="form-control" type="number" name="tax" id="tax">
                        </div>

                        <div class="mb-2 d-flex gap-2">
                            <label class="fw-bold" for="status">Status:</label>
                            <input type="radio" name="is_active" value="1" class="status">Active
                            <input type="radio" name="is_active" value="0" class="status">Inactive
                        </div>

                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" id="p_submit" class="btn btn-primary">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
        integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js"
        integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V"
        crossorigin="anonymous"></script>

    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

    <script src="http://php_pr.test/CRUD2_AJAX/script.js"></script>
</body>

</html>
